<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f0f" />
    <title>쇼츠 위치 지도</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" crossorigin="" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <nav id="sidebar-nav">
        <button id="nav-menu-btn" type="button" class="nav-item" title="메뉴">
          <span class="nav-icon-wrap">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </span>
        </button>
        <button id="nav-home" type="button" class="nav-item active" title="홈">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span class="nav-label">홈</span>
        </button>
        <button id="nav-shorts" type="button" class="nav-item" title="Shorts">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="14" height="16" rx="2"/>
            <polygon points="18 8 22 12 18 16 18 8"/>
          </svg>
          <span class="nav-label">Shorts</span>
        </button>
        <button id="nav-subscriptions" type="button" class="nav-item" title="구독">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="2" width="20" height="20" rx="2"/>
            <polygon points="10 8 16 12 10 16 10 8"/>
          </svg>
          <span class="nav-label">구독</span>
        </button>
        <button id="nav-mypage" type="button" class="nav-item" title="내 페이지">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="9" r="3"/>
            <path d="M6 20c1.5-2 3.5-3 6-3s4.5 1 6 3"/>
          </svg>
          <span class="nav-label">내 페이지</span>
        </button>
      </nav>
      <div id="main-content">
      <header id="main-header">
        <h1 id="main-header-title">쇼츠 위치 지도</h1>
      </header>
      <div id="subscriptions-page" class="page-hidden">
        <div class="subs-header">
          <div class="subs-header-row">
            <h1 class="subs-title">구독</h1>
            <div class="subs-search-wrap yt-search-wrap yt-search-bar">
              <span class="search-icon" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
              </span>
              <input type="text" id="subs-search-input" placeholder="채널·쇼츠 검색" autocomplete="off" />
            </div>
          </div>
          <div class="subs-chips-scroll">
            <div class="subs-chips">
              <button type="button" class="subs-chip active">전체</button>
              <button type="button" class="subs-chip">오늘</button>
              <button type="button" class="subs-chip">이번 주</button>
              <button type="button" class="subs-chip">이번 달</button>
            </div>
          </div>
        </div>
        <div class="subs-slider-wrap">
          <button type="button" class="subs-slider-btn subs-slider-prev" aria-label="이전">‹</button>
          <div class="subs-channels" id="subs-channels"></div>
          <button type="button" class="subs-slider-btn subs-slider-next" aria-label="다음">›</button>
        </div>
        <div id="add-channel-modal" class="modal-overlay hidden">
          <div class="modal-content">
            <h3 class="modal-title">채널 추가</h3>
            <p class="modal-desc">채널명을 검색하거나, YouTube URL을 붙여넣으면 설명·댓글에 주소가 있는 쇼츠만 가져옵니다.</p>
            <div class="add-url-row">
              <input type="text" id="add-url-input" class="modal-input" placeholder="YouTube URL 붙여넣기 (채널 또는 쇼츠)" autocomplete="off" />
              <button type="button" id="add-url-btn" class="modal-btn modal-btn-confirm">추가</button>
            </div>
            <div class="add-channel-search-wrap yt-search-wrap yt-search-bar">
              <span class="search-icon" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
              </span>
              <input type="text" id="add-channel-input" class="modal-input" placeholder="채널명 검색" autocomplete="off" />
            </div>
            <div id="add-channel-results" class="channel-search-results"></div>
            <div class="modal-actions">
              <button type="button" class="modal-btn modal-btn-cancel">취소</button>
            </div>
          </div>
        </div>
        <div class="subs-shorts-section">
          <div class="subs-shorts-grid" id="subs-shorts-grid"></div>
        </div>
      </div>
      <div id="shorts-page" class="page-hidden">
        <div class="shorts-page-header">
          <h1 class="shorts-page-title">인기 쇼츠</h1>
          <p class="shorts-page-desc">위치별 조회수·인기도 순 (한 달 기준)</p>
        </div>
        <div class="shorts-page-chips">
          <button type="button" class="shorts-scope-chip active" data-scope="world">전 세계</button>
          <button type="button" class="shorts-scope-chip" data-scope="country">국가별</button>
          <button type="button" class="shorts-scope-chip" data-scope="city">시·도별</button>
        </div>
        <div id="shorts-rank-country-wrap" class="shorts-rank-select-wrap hidden">
          <label>국가</label>
          <select id="shorts-rank-country" class="shorts-rank-select"></select>
        </div>
        <div id="shorts-rank-city-wrap" class="shorts-rank-select-wrap hidden">
          <label>시·도</label>
          <select id="shorts-rank-city" class="shorts-rank-select"></select>
        </div>
        <div class="shorts-rank-grid" id="shorts-rank-grid"></div>
      </div>
      <div id="home-page">
      <div id="map-container">
        <button id="home-btn" type="button" title="홈">
          <span class="home-icon">🗺️</span>
        </button>
        <div id="map-overlay">
          <div id="info-panel">
            <div id="map-search-bar-mobile" class="map-search-bar-mobile">
            <div id="map-search-wrap" class="yt-search-wrap yt-search-bar">
              <span class="search-icon" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
              </span>
              <input type="text" id="map-search-input" placeholder="쇼츠 위치·장소 검색" autocomplete="off" />
            </div>
              <button id="gps-btn" type="button" class="gps-btn-circle" title="내 위치" aria-label="내 위치">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
              </button>
            </div>
            <div id="map-category-chips" class="map-category-chips">
              <button type="button" class="map-chip">쇼츠</button>
              <button type="button" class="map-chip">장소</button>
              <button type="button" class="map-chip">내 위치</button>
            </div>
            <p id="gps-status" class="gps-status-text"></p>
          </div>
        </div>
        <div id="map"></div>
        <div id="map-location-info" class="map-location-info">
          <p class="map-location-placeholder">지도 마커를 클릭하거나 장소를 검색하면 쇼츠 위치 정보가 표시됩니다.</p>
        </div>
      </div>
      <div id="resize-handle" title="드래그하여 크기 조절" role="separator" aria-label="드래그하여 쇼츠 크기 조절">
        <span class="resize-handle-icon">⋮⋮</span>
      </div>
      <div id="shorts-section">
        <div id="shorts-search-wrap" class="yt-search-wrap yt-search-bar">
          <span class="search-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          </span>
          <input type="text" id="shorts-search-input" placeholder="쇼츠 검색" autocomplete="off" />
        </div>
        <div id="shorts-container">
          <div id="shorts-list-header" class="shorts-list-header" style="display: none;">
            <span class="shorts-list-header-text"></span>
            <button type="button" class="place-filter-clear">전체 보기</button>
          </div>
          <div class="shorts-list" id="shorts-list"></div>
        </div>
      </div>
      <div id="shorts-player" class="hidden">
        <button id="close-player" type="button">✕</button>
        <div id="player-video-wrap">
          <iframe id="player-iframe" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
        </div>
        <div id="player-info">
          <div class="player-title-row">
            <span id="player-title"></span>
            <div class="player-buttons">
              <button id="player-expand-btn" type="button" class="player-map-btn" title="전체 창으로 보기">⛶</button>
              <button id="player-show-map-btn" type="button" class="player-map-btn" title="지도에서 위치 보기"><svg class="player-map-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg></button>
            </div>
          </div>
          <span id="player-views"></span>
          <a id="player-yt-link" href="#" target="_blank" rel="noopener">YouTube에서 보기</a>
        </div>
      </div>
      </div>
      </div>
    </div>
    <div id="update-channel-overlay" class="update-progress-bar hidden">
      <span class="update-progress-label">업데이트 중</span>
      <div class="update-progress-track">
        <div class="update-progress-fill" id="update-progress-bar" style="width: 0%"></div>
      </div>
      <span class="update-progress-percent" id="update-progress-percent">0%</span>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
